name: Generate Bomberman Animation

on:
  schedule:
    - cron: "0 */12 * * *" # Roda a cada 12 horas
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gera a animação do Bomberman (Gera as versões Light e Dark automaticamente)
      - name: generate github-contribution-bomberman
        uses: kurogoma4d/github-contribution-bomberman@master
        with:
          github_user_name: ${{ github.repository_owner }}
          output_dir: dist

      # Renomeia os arquivos gerados para bater exatamente com o seu README atual
      - name: Rename files to match README
        run: |
          mv dist/bomberman.svg dist/pacman-contribution-graph.svg
          mv dist/bomberman-dark.svg dist/pacman-contribution-graph-dark.svg

      # Envia os arquivos atualizados para a branch pacman-output
      - name: push bomberman to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
