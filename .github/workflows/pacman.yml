name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *" # Ajustado para rodar a cada 12 horas como estava no seu comentário
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gera os SVGs do Pacman diretamente para a pasta dist (Light e Dark)
      - name: generate pacman-contribution-graph.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark

      # Envia os arquivos gerados exatamente para a branch que seu README procura
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
