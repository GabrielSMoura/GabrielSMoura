name: Generate Bomberman Animation

on:
  schedule:
    - cron: "0 */12 * * *" # Roda a cada 12 horas
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Puxa o repositório para que a Action consiga trabalhar
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Gera a animação legítima do Bomberman
      - name: generate-bomberman-svg
        uses: svenstaro/bomberman-action@master
        with:
          github_user_name: ${{ github.repository_owner }}
          output: dist/pacman-contribution-graph.svg

      # Duplica o arquivo para enganar o README caso ele mude para o modo dark
      - name: Prepare dark mode file
        run: cp dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg

      # Envia os arquivos para a branch pacman-output
      - name: push bomberman to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
